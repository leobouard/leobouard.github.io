<script>
  function hidePaginator() {
    const paginator = document.getElementById('paginator-nav');
    if (paginator) {
      paginator.style.display = 'none';
    }
  }

  function showAndResetPaginator() {
    const paginator = document.getElementById('paginator-nav');
    if (paginator) {
      paginator.style.display = '';
      if (window.resetPaginator) {
        window.resetPaginator();
      }
    }
  }

  function filterByTag(tag) {
    let isAlreadySelected = false;
    document.querySelectorAll('a[onclick^="filterByTag"]').forEach(link => {
      if (link.getAttribute('onclick').includes(`'${tag}'`) && link.classList.contains('selected')) {
        isAlreadySelected = true;
      }
    });

    if (isAlreadySelected) {
      clearfilterByTag();
      showAllYears();
      return;
    }

    document.querySelectorAll('a[onclick^="filterByTag"]').forEach(link => {
      link.classList.remove('selected');
    });

    const articles = document.querySelectorAll('.all-posts article');
    const projects = document.querySelectorAll('.project');
    
    articles.forEach(article => {
      article.style.display = '';
    });
    projects.forEach(project => {
      project.style.display = '';
    });

    document.querySelectorAll('#tag-container').forEach(container => {
      const tags = container.querySelector('#tags');
      if (!tags || !tags.textContent.includes(tag)) {
        container.style.display = 'none';
      }
    });
    
    document.querySelectorAll('a[onclick^="filterByTag"]').forEach(link => {
      if (link.getAttribute('onclick').includes(`'${tag}'`)) {
        link.classList.add('selected');
      }
    });
    
    hideEmtpyYear();
    hidePaginator();
  }

  function clearfilterByTag() {
    document.querySelectorAll('#tag-container').forEach(container => {
      container.style.display = '';
    });
    document.querySelectorAll('a[onclick^="filterByTag"]').forEach(link => {
      link.classList.remove('selected');
    });
    showAndResetPaginator();
  }

  function hideEmtpyYear() {
    document.querySelectorAll(".project-container").forEach(container => {
      let projects = container.querySelectorAll(".project");
      let allHidden = true;

      projects.forEach(project => {
        if (window.getComputedStyle(project).display !== "none") {
          allHidden = false;
        }
      });

      if (allHidden) {
        container.style.display = "none";
      }
      else {
        container.style.display = "flex";
      }
    });
  }

  function showAllYears() {
    document.querySelectorAll(".project-container").forEach(container => {
      container.style.display = "flex";
    });
  }
</script>
