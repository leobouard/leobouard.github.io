<div class="article-info">
  <span>
    <i class="fa-solid fa-calendar-days" aria-hidden="true"></i>
    Publié le {% include format-date.html date=include.date %}
  </span>
  <span class="article-info-modified" data-gh-last-modified="true" data-gh-owner="{{ site.github_owner }}" data-gh-repo="{{ site.github_repo }}" data-gh-branch="{{ site.github_branch }}" data-gh-path="{{ page.path }}" aria-live="polite">
    <i class="fa-solid fa-calendar-days" aria-hidden="true"></i>
    <span class="article-info-modified-text">Chargement de la date...</span>
  </span>
  <span>
    <i class="fa-regular fa-clock" aria-hidden="true"></i>
    {% include reading-time.html content=include.content %}
  </span>
  <span>
    <i class="fa-brands fa-markdown" aria-hidden="true"></i>
    <a href="{{ site.repository }}{{ page.path }}" target="_blank" class="no-decoration">Voir le Markdown</a>
  </span>
</div>
