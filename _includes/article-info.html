<div class="article-info">
  <span>
    <i class="fa-solid fa-calendar-days" aria-hidden="true"></i>
    Publié le {% include format-date.html date=include.date %}
  </span>
  <span>
    <i class="fa-regular fa-clock" aria-hidden="true"></i>
    {% include reading-time.html content=include.content %}
  </span>
  <span>
    <i class="fa-brands fa-markdown" aria-hidden="true"></i>
    <a href="{{ page.path }}" target="_blank" class="no-decoration">Voir le Markdown</a>
  </span>
</div>
