<script>
    (function () {
    const pageSize = 15;
    const articles = Array.from(document.querySelectorAll("article"));
    const totalPages = Math.ceil(articles.length / pageSize);
    let currentPage = 1;

    function renderPage(page) {
        currentPage = page;

        articles.forEach((a, i) => {
            const start = (page - 1) * pageSize;
            const end = start + pageSize;
            a.style.display = (i >= start && i < end) ? "" : "none";
        });

        pageIndicator.textContent = `Page ${currentPage} / ${totalPages}`;
        prevBtn.disabled = currentPage === 1;
        nextBtn.disabled = currentPage === totalPages;
    }

    const nav = document.createElement("div");
    nav.className = "paginator";

    const prevBtn = document.createElement("button");
    prevBtn.className = "button-primary hover-bottom";
    prevBtn.innerHTML = '<i class="fa-solid fa-arrow-left"></i> Précédent';
    prevBtn.onclick = () => {
        renderPage(currentPage - 1);
        document.getElementById('top').scrollIntoView({behavior: 'smooth'});
    };

    const nextBtn = document.createElement("button");
    nextBtn.className = "button-primary hover-bottom";
    nextBtn.innerHTML = 'Suivant <i class="fa-solid fa-arrow-right"></i>';
    nextBtn.onclick = () => {
        renderPage(currentPage + 1);
        document.getElementById('top').scrollIntoView({behavior: 'smooth'});
    };

    const pageIndicator = document.createElement("small");

    nav.append(prevBtn, pageIndicator, nextBtn);

    const allPostsDiv = document.querySelector(".all-posts");
    if (allPostsDiv) {
        allPostsDiv.parentNode.insertBefore(nav, allPostsDiv.nextSibling);
    }

    renderPage(1);
})();
</script>
