<script>
    document.addEventListener('DOMContentLoaded', function () {
        const base64string = document.getElementById('base64-string');
        if (base64string) {
            const encodedPhone = base64string.textContent.trim();
            base64string.addEventListener('mouseover', function () {
                if (base64string.textContent === encodedPhone) {
                    try {
                        const decoded = atob(encodedPhone);
                        base64string.textContent = decoded;
                    } catch (e) {
                        console.error('Failed to decode base 64 string:', e);
                    }
                }
            });
        }
    });
</script>
